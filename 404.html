<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Ecos</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-primary); }
        .error-container { text-align:center; padding:40px; }
        .error-container .icon { font-size:80px; }
        .error-container h1 { font-size:48px; margin:16px 0; }
        .error-container p { color:var(--text-tertiary); margin-bottom:24px; }
        .btn { display:inline-flex; padding:14px 32px; background:linear-gradient(135deg,#007AFF,#5856D6); color:#fff; border:none; border-radius:12px; font-size:16px; font-weight:600; cursor:pointer; text-decoration:none; transition:all 0.3s; }
        .btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,122,255,0.3); }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="icon">🌿</div>
        <h1>404</h1>
        <p>¡Ups! Esta página no existe en Ecos</p>
        <a href="index.html" class="btn">Volver al inicio</a>
    </div>
</body>
</html>
