<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌿 Ecos - Red Social</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        .feed-header { display:flex; justify-content:space-between; align-items:center; padding:16px 0; }
        .feed-header h1 { font-size:20px; }
        .stories-bar { display:flex; gap:12px; overflow-x:auto; padding:8px 0 16px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
        .stories-bar::-webkit-scrollbar { display:none; }
        .story-item { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; }
        .story-avatar { width:64px; height:64px; border-radius:50%; border:3px solid var(--primary); padding:2px; object-fit:cover; }
        .story-name { font-size:11px; color:var(--text-tertiary); max-width:64px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .create-story-btn { width:64px; height:64px; border-radius:50%; border:2px dashed var(--border-color); display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer; background:var(--bg-primary); transition:all 0.3s; }
        .create-story-btn:hover { border-color:var(--primary); }
        .tab-bar { display:flex; gap:4px; background:var(--bg-tertiary); border-radius:12px; padding:4px; margin-bottom:16px; }
        .tab-item { flex:1; padding:8px; text-align:center; border-radius:8px; cursor:pointer; transition:all 0.3s; font-weight:500; color:var(--text-tertiary); border:none; background:none; }
        .tab-item.active { background:var(--bg-card); color:var(--primary); box-shadow:var(--shadow); }
        .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--glass-bg); backdrop-filter:blur(20px); border-top:1px solid var(--glass-border); display:flex; justify-content:space-around; align-items:center; padding:8px 0 24px; z-index:200; }
        .bottom-nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; background:none; border:none; color:var(--text-tertiary); font-size:10px; font-weight:500; cursor:pointer; padding:4px 16px; position:relative; }
        .bottom-nav-item .icon { font-size:24px; }
        .bottom-nav-item.active { color:var(--primary); }
        .create-btn { background:linear-gradient(135deg,var(--primary),var(--secondary)); color:white !important; width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; margin-top:-16px; box-shadow:0 4px 20px rgba(0,122,255,0.4); }
        .badge { position:absolute; top:-2px; right:4px; background:var(--danger); color:white; font-size:10px; font-weight:600; min-width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; padding:0 4px; }
        .card { background:var(--bg-card); border-radius:16px; padding:16px 20px; margin-bottom:16px; box-shadow:var(--shadow); border:1px solid var(--border-color); transition:all 0.3s; }
        .card:hover { box-shadow:var(--shadow-hover); transform:translateY(-2px); }
        .post-header { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
        .post-avatar { width:44px; height:44px; border-radius:50%; object-fit:cover; border:2px solid var(--primary); }
        .post-user { font-weight:600; font-size:15px; color:var(--text-primary); }
        .post-username { font-weight:400; color:var(--text-tertiary); font-size:13px; }
        .post-time { color:var(--text-tertiary); font-size:12px; }
        .post-content { font-size:15px; line-height:1.7; margin-bottom:12px; color:var(--text-primary); }
        .post-media { width:100%; border-radius:12px; margin:10px 0; max-height:500px; object-fit:cover; }
        .post-actions { display:flex; gap:24px; padding-top:12px; border-top:1px solid var(--border-color); }
        .post-actions button { background:none; border:none; color:var(--text-tertiary); font-size:14px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:20px; transition:all 0.3s; }
        .post-actions button:hover { background:var(--bg-tertiary); color:var(--primary); }
        .post-actions .liked { color:var(--danger); }
        .navbar-actions { display:flex; align-items:center; gap:16px; }
        .navbar-actions button { background:none; border:none; color:var(--text-secondary); font-size:20px; cursor:pointer; padding:8px; border-radius:50%; transition:all 0.3s; position:relative; }
        .navbar-actions button:hover { background:var(--bg-tertiary); transform:scale(1.05); }
        .notification-badge { position:absolute; top:4px; right:4px; background:var(--danger); color:white; font-size:10px; font-weight:600; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
        .loading-skeleton { padding:16px; }
        .skeleton-item { margin-bottom:12px; }
        .skeleton { background:var(--bg-tertiary); border-radius:8px; animation:pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        .navbar { background:var(--glass-bg); backdrop-filter:blur(20px); border-bottom:1px solid var(--glass-border); padding:12px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
        .logo { font-size:22px; font-weight:700; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🌿 Ecos</div>
        <div class="navbar-actions">
            <button id="searchBtn">🔍</button>
            <button id="notifBtn">🔔<span class="notification-badge" id="notifBadge" style="display:none;">0</span></button>
            <button id="themeToggle">🌙</button>
            <img id="userAvatar" src="https://ui-avatars.com/api/?name=U&background=007AFF&color=fff" style="width:36px;height:36px;border-radius:50%;cursor:pointer;border:2px solid var(--primary);">
        </div>
    </nav>

    <div class="container" style="padding-bottom:80px;">
        <div class="stories-bar" id="storiesBar">
            <div class="story-item" onclick="window.location.href='pages/crear-story.html'">
                <div class="create-story-btn">+</div>
                <span class="story-name">Tu historia</span>
            </div>
        </div>

        <div class="tab-bar">
            <button class="tab-item active" data-tab="feed">📡 Feed</button>
            <button class="tab-item" data-tab="trending">🔥 Trending</button>
            <button class="tab-item" data-tab="communities">👥 Comunidades</button>
        </div>

        <div id="feedContent">
            <div id="postsContainer">
                <div class="loading-skeleton">
                    <div class="skeleton-item"><div class="skeleton" style="height:80px;"></div></div>
                    <div class="skeleton-item"><div class="skeleton" style="height:120px;"></div></div>
                    <div class="skeleton-item"><div class="skeleton" style="height:100px;"></div></div>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="bottom-nav-item active" onclick="window.location.href='index.html'"><span class="icon">🏠</span><span>Inicio</span></button>
        <button class="bottom-nav-item" onclick="window.location.href='pages/buscar.html'"><span class="icon">🔍</span><span>Buscar</span></button>
        <button class="bottom-nav-item create-btn" onclick="window.location.href='pages/crear-eco.html'"><span>+</span></button>
        <button class="bottom-nav-item" onclick="window.location.href='pages/notificaciones.html'"><span class="icon">🔔</span><span>Notif.</span><span class="badge" id="bottomNotifBadge" style="display:none;">0</span></button>
        <button class="bottom-nav-item" onclick="window.location.href='pages/perfil.html'"><span class="icon">👤</span><span>Perfil</span></button>
    </nav>

    <script type="importmap">{"imports":{"@supabase/supabase-js":"https://esm.sh/@supabase/supabase-js@2"}}</script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        
        const supabaseAuth = createClient('https://ecos-auth.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjb3MtYXV0aCIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzE5MjM0NTY3LCJleHAiOjIwMzQ4MDU0Njd9.ejemploClaveAuth1234567890');
        const supabaseContent = createClient('https://ecos-content.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjb3MtY29udGVudCIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzE5MjM0NTY4LCJleHAiOjIwMzQ4MDU0Njh9.ejemploClaveContent1234567890');

        const postsContainer = document.getElementById('postsContainer');
        const userAvatar = document.getElementById('userAvatar');
        const themeToggle = document.getElementById('themeToggle');

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme','dark');
            themeToggle.textContent = '☀️';
        }

        themeToggle.onclick = () => {
            const current = document.documentElement.getAttribute('data-theme');
            if (current === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeToggle.textContent = '🌙';
                localStorage.setItem('theme','light');
            } else {
                document.documentElement.setAttribute('data-theme','dark');
                themeToggle.textContent = '☀️';
                localStorage.setItem('theme','dark');
            }
        };

        const { data: { session } } = await supabaseAuth.auth.getSession();
        if (!session) window.location.href = 'pages/login.html';
        else {
            const { data: profile } = await supabaseAuth.from('perfiles').select('avatar_url').eq('id',session.user.id).single();
            if (profile?.avatar_url) userAvatar.src = profile.avatar_url;
        }

        async function loadPosts() {
            const { data: posts, error } = await supabaseContent.from('publicaciones').select('*').order('creado_en',{ascending:false}).limit(20);
            if (error) { postsContainer.innerHTML = '<p style="color:var(--danger);">❌ Error</p>'; return; }
            if (!posts || posts.length === 0) {
                postsContainer.innerHTML = '<div class="card" style="text-align:center;padding:40px;"><p>🌿 No hay publicaciones</p><p style="font-size:14px;">¡Crea tu primer Eco!</p></div>';
                return;
            }
            let html = '';
            for (const p of posts) {
                const isEco = p.tipo === 'eco';
                html += `<div class="card slide-up">
                    <div class="post-header">
                        <img class="post-avatar" src="https://ui-avatars.com/api/?name=U&background=007AFF&color=fff">
                        <div><div class="post-user">Usuario</div><div class="post-username">@usuario · ${new Date(p.creado_en).toLocaleDateString()}</div></div>
                    </div>
                    ${p.titulo ? `<h3>${p.titulo}</h3>` : ''}
                    <div class="post-content">${p.contenido || ''}</div>
                    ${p.media_url ? (isEco ? `<video class="post-media" controls src="${p.media_url}"></video>` : `<img class="post-media" src="${p.media_url}">`) : ''}
                    ${isEco ? '<span style="background:var(--primary-light);color:var(--primary);padding:2px 12px;border-radius:30px;font-size:12px;">🎬 Eco</span>' : ''}
                    <div class="post-actions">
                        <button onclick="likePost('${p.id}')">❤️ <span id="likes-${p.id}">0</span></button>
                        <button onclick="window.location.href='pages/post.html?id=${p.id}'">💬 <span>0</span></button>
                        <button onclick="sharePost('${p.id}')">🔗</button>
                    </div>
                </div>`;
            }
            postsContainer.innerHTML = html;
        }
        loadPosts();

        window.likePost = async (id) => { alert('💚 Like funcionando (requiere sesión)'); };
        window.sharePost = (id) => { navigator.share ? navigator.share({title:'Ecos',text:'Mira esto en Ecos',url:window.location.href}) : alert('🔗 Copia el enlace'); };
    </script>
</body>
</html>
