<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecos - Crear Comunidad</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:14px 28px; border:none; border-radius:12px; font-size:16px; font-weight:600; cursor:pointer; transition:all 0.3s; }
        .btn-primary { background:linear-gradient(135deg,#007AFF,#5856D6); color:#fff; }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,122,255,0.3); }
        .btn-block { width:100%; }
        .char-counter { text-align:right; font-size:12px; color:var(--text-tertiary); }
        .char-counter.limit { color:var(--danger); }
        .preview-avatar { width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid var(--primary); margin:10px 0; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🌿 Ecos</div>
        <div class="nav-links"><a href="../index.html" style="color:var(--text-secondary);text-decoration:none;">← Volver</a></div>
    </nav>

    <div class="container" style="max-width:500px;padding:20px 16px;">
        <h2>🏛️ Crear Comunidad</h2>
        <p style="color:var(--text-tertiary);margin-bottom:20px;">Crea un espacio temático para tu comunidad</p>

        <form id="comunidadForm">
            <div class="input-group">
                <label>Nombre de la comunidad</label>
                <input type="text" class="input" id="nombre" placeholder="Ej: Tecnología, Música, Gaming..." required maxlength="30">
                <div class="char-counter" id="nameCounter">0/30</div>
            </div>

            <div class="input-group">
                <label>Descripción</label>
                <textarea class="input" id="descripcion" placeholder="Describe de qué trata tu comunidad" rows="3" required maxlength="200"></textarea>
                <div class="char-counter" id="descCounter">0/200</div>
            </div>

            <div class="input-group">
                <label>Avatar de la comunidad</label>
                <input type="file" class="input" id="avatarFile" accept="image/*" style="padding:8px;">
                <div id="avatarPreview"></div>
            </div>

            <div class="input-group">
                <label>Categoría</label>
                <select class="input" id="categoria">
                    <option value="general">🌍 General</option>
                    <option value="tecnologia">💻 Tecnología</option>
                    <option value="musica">🎵 Música</option>
                    <option value="gaming">🎮 Gaming</option>
                    <option value="arte">🎨 Arte</option>
                    <option value="ciencia">🔬 Ciencia</option>
                    <option value="deportes">⚽ Deportes</option>
                    <option value="otros">📌 Otros</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="submitBtn">🏛️ Crear Comunidad</button>
        </form>
        <div id="result" style="margin-top:16px;"></div>
    </div>

    <script type="importmap">{"imports":{"@supabase/supabase-js":"https://esm.sh/@supabase/supabase-js@2"}}</script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        const supabaseAuth = createClient('https://ecos-auth.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjb3MtYXV0aCIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzE5MjM0NTY3LCJleHAiOjIwMzQ4MDU0Njd9.ejemploClaveAuth1234567890');
        const supabaseContent = createClient('https://ecos-content.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjb3MtY29udGVudCIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzE5MjM0NTY4LCJleHAiOjIwMzQ4MDU0Njh9.ejemploClaveContent1234567890');

        const form = document.getElementById('comunidadForm');
        const result = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');
        const nombre = document.getElementById('nombre');
        const descripcion = document.getElementById('descripcion');

        document.getElementById('nameCounter').textContent = '0/30';
        document.getElementById('descCounter').textContent = '0/200';

        nombre.addEventListener('input', () => {
            document.getElementById('nameCounter').textContent = `${nombre.value.length}/30`;
        });
        descripcion.addEventListener('input', () => {
            document.getElementById('descCounter').textContent = `${descripcion.value.length}/200`;
        });

        const { data: { session } } = await supabaseAuth.auth.getSession();
        if (!session) {
            result.innerHTML = '<p style="color:var(--danger);">⚠️ Inicia sesión para crear una comunidad</p>';
            submitBtn.disabled = true;
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            if (!session) { alert('Inicia sesión primero'); return; }
            const nombreVal = nombre.value.trim();
            const descVal = descripcion.value.trim();
            const file = document.getElementById('avatarFile').files[0];
            const categoria = document.getElementById('categoria').value;

            if (!nombreVal) { result.innerHTML = '<p style="color:var(--danger);">Ingresa un nombre</p>'; return; }

            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Creando...';
            result.innerHTML = '';

            try {
                let avatar_url = null;
                if (file) {
                    const fileName = `comunidades/${Date.now()}_${file.name}`;
                    const { error: upErr } = await supabaseContent.storage.from('comunidades').upload(fileName, file);
                    if (!upErr) {
                        const { data: { publicUrl } } = supabaseContent.storage.from('comunidades').getPublicUrl(fileName);
                        avatar_url = publicUrl;
                    }
                }

                const { error: dbErr } = await supabaseContent.from('comunidades').insert([{
                    nombre: nombreVal,
                    descripcion: descVal,
                    avatar_url: avatar_url,
                    categoria: categoria,
                    creador_id: session.user.id
                }]);
                if (dbErr) throw new Error(dbErr.message);

                result.innerHTML = '<div style="background:rgba(52,199,89,0.1);padding:16px;border-radius:12px;color:var(--success);">✅ ¡Comunidad creada! <a href="../index.html" style="color:var(--primary);">Volver al feed</a></div>';
                form.reset();
            } catch (err) {
                result.innerHTML = `<p style="color:var(--danger);">❌ ${err.message}</p>`;
            }
            submitBtn.disabled = false;
            submitBtn.textContent = '🏛️ Crear Comunidad';
        };
    </script>
</body>
</html>
