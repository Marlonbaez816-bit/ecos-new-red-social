<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecos - Perfil</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .profile-header { position:relative; margin-bottom:16px; }
        .cover-photo { width:100%; height:140px; background:linear-gradient(135deg,var(--primary),var(--secondary)); border-radius:16px; object-fit:cover; }
        .profile-avatar { width:72px; height:72px; border-radius:50%; border:4px solid var(--bg-card); margin-top:-36px; margin-left:20px; object-fit:cover; }
        .profile-info { padding:0 20px 16px; }
        .profile-name { font-size:20px; font-weight:700; }
        .profile-username { color:var(--text-tertiary); font-size:14px; }
        .profile-bio { margin:8px 0; font-size:14px; }
        .profile-stats { display:flex; gap:24px; margin:8px 0; }
        .stat-number { font-weight:700; }
        .stat-label { color:var(--text-tertiary); font-size:12px; }
        .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:12px 24px; border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.3s; }
        .btn-primary { background:linear-gradient(135deg,#007AFF,#5856D6); color:#fff; }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,122,255,0.3); }
        .btn-outline { background:transparent; border:2px solid var(--primary); color:var(--primary); }
        .btn-outline:hover { background:var(--primary); color:#fff; }
        .btn-danger { background:#FF3B30; color:#fff; }
        .btn-danger:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(255,59,48,0.3); }
        .post-card { background:var(--bg-card); border-radius:16px; padding:16px 20px; margin-bottom:16px; box-shadow:var(--shadow); border:1px solid var(--border-color); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🌿 Ecos</div>
        <div class="nav-links"><a href="../index.html" style="color:var(--text-secondary);text-decoration:none;">← Volver</a></div>
    </nav>

    <div class="container" style="padding-bottom:80px;">
        <div id="profileContainer"><p style="text-align:center;padding:20px;">Cargando...</p></div>
        <div id="postsContainer"></div>
    </div>

    <script type="importmap">{"imports":{"@supabase/supabase-js":"https://esm.sh/@supabase/supabase-js@2"}}</script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        const supabaseAuth = createClient('https://ecos-auth.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjb3MtYXV0aCIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzE5MjM0NTY3LCJleHAiOjIwMzQ4MDU0Njd9.ejemploClaveAuth1234567890');
        const supabaseContent = createClient('https://ecos-content.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjb3MtY29udGVudCIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzE5MjM0NTY4LCJleHAiOjIwMzQ4MDU0Njh9.ejemploClaveContent1234567890');
        const supabaseSocial = createClient('https://ecos-social.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjb3Mtc29jaWFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTkyMzQ1NjksImV4cCI6MjAzNDgwNTQ2OX0.ejemploClaveSocial1234567890');

        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        const { data: { session } } = await supabaseAuth.auth.getSession();
        if (!session) window.location.href = 'login.html';

        async function loadProfile() {
            const { data: profile, error } = await supabaseAuth.from('perfiles').select('*').eq('id', userId).single();
            if (error || !profile) {
                document.getElementById('profileContainer').innerHTML = '<p style="color:var(--danger);">❌ Usuario no encontrado</p>';
                return;
            }

            // Contar seguidores
            const { count: followers } = await supabaseSocial.from('seguidores').select('*', { count: 'exact', head: true }).eq('seguido_id', userId);
            const { count: following } = await supabaseSocial.from('seguidores').select('*', { count: 'exact', head: true }).eq('seguidor_id', userId);
            const { count: posts } = await supabaseContent.from('publicaciones').select('*', { count: 'exact', head: true }).eq('usuario_id', userId);

            // Verificar si ya sigo a este usuario
            const { data: followCheck } = await supabaseSocial.from('seguidores').select('*').eq('seguidor_id', session.user.id).eq('seguido_id', userId);
            const isFollowing = followCheck && followCheck.length > 0;

            document.getElementById('profileContainer').innerHTML = `
                <div class="profile-header">
                    <img class="cover-photo" src="${profile.portada_url || 'https://picsum.photos/seed/'+profile.id+'/600/200'}">
                    <img class="profile-avatar" src="${profile.avatar_url || 'https://ui-avatars.com/api/?name='+profile.nombre+'&background=007AFF&color=fff&size=72'}">
                    <div class="profile-info">
                        <div class="profile-name">${profile.nombre || 'Usuario'}</div>
                        <div class="profile-username">@${profile.username || 'usuario'}</div>
                        <div class="profile-bio">${profile.bio || 'Sin biografía'}</div>
                        <div class="profile-stats">
                            <div><span class="stat-number">${followers || 0}</span> <span class="stat-label">Seguidores</span></div>
                            <div><span class="stat-number">${following || 0}</span> <span class="stat-label">Siguiendo</span></div>
                            <div><span class="stat-number">${posts || 0}</span> <span class="stat-label">Publicaciones</span></div>
                        </div>
                        <button class="btn ${isFollowing ? 'btn-danger' : 'btn-primary'} btn-block" id="followBtn">
                            ${isFollowing ? '🔴 Dejar de seguir' : '➕ Seguir'}
                        </button>
                    </div>
                </div>
            `;

            // Seguir/Dejar de seguir
            document.getElementById('followBtn').onclick = async () => {
                const isFollowing = document.getElementById('followBtn').textContent.includes('Dejar');
                if (isFollowing) {
                    await supabaseSocial.from('seguidores').delete().eq('seguidor_id', session.user.id).eq('seguido_id', userId);
                    document.getElementById('followBtn').textContent = '➕ Seguir';
                    document.getElementById('followBtn').className = 'btn btn-primary btn-block';
                } else {
                    await supabaseSocial.from('seguidores').insert([{ seguidor_id: session.user.id, seguido_id: userId }]);
                    document.getElementById('followBtn').textContent = '🔴 Dejar de seguir';
                    document.getElementById('followBtn').className = 'btn btn-danger btn-block';
                }
            };

            loadPosts(userId);
        }

        async function loadPosts(userId) {
            const { data: posts } = await supabaseContent.from('publicaciones').select('*').eq('usuario_id', userId).order('creado_en', { ascending: false });
            const container = document.getElementById('postsContainer');
            if (!posts || posts.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:var(--text-tertiary);padding:20px;">📭 No hay publicaciones</p>';
                return;
            }
            let html = '';
            for (const p of posts) {
                const isEco = p.tipo === 'eco';
                html += `
                    <div class="post-card">
                        <div class="post-header">
                            <img class="post-avatar" src="https://ui-avatars.com/api/?name=U&background=007AFF&color=fff">
                            <div><div class="post-user">Usuario</div><div class="post-username">${new Date(p.creado_en).toLocaleDateString()}</div></div>
                        </div>
                        ${p.titulo ? `<h3>${p.titulo}</h3>` : ''}
                        <div class="post-content">${p.contenido || ''}</div>
                        ${p.media_url ? (isEco ? `<video class="post-media" controls src="${p.media_url}"></video>` : `<img class="post-media" src="${p.media_url}">`) : ''}
                        ${isEco ? '<span style="background:var(--primary-light);color:var(--primary);padding:2px 12px;border-radius:30px;font-size:12px;">🎬 Eco</span>' : ''}
                        <div class="post-actions">
                            <button>❤️ ${p.likes || 0}</button>
                            <button onclick="window.location.href='post.html?id=${p.id}'">💬 ${p.comentarios || 0}</button>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        loadProfile();
    </script>
</body>
</html>
